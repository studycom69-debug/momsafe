kind = "web"
previewPath = "/"
title = "MomSafe AI"
version = "1.0.0"
id = "artifacts/momsafe-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23067

[services.development]
run = "pnpm --filter @workspace/momsafe-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/momsafe-ai", "run", "build" ]
publicDir = "artifacts/momsafe-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23067"
BASE_PATH = "/"
